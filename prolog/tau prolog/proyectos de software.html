<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Experto - Asignación de Proyectos</title>
    <script src="https://cdn.jsdelivr.net/npm/tau-prolog@0.3.4/modules/core.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1, h2 {
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }
        .grid-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 15px;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background-color: #2980b9;
        }
        .search-box {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #e0e0e0;
            margin-bottom: 25px;
        }
        select {
            padding: 8px;
            font-size: 14px;
            border-radius: 4px;
            border: 1px solid #ccc;
            margin-right: 10px;
        }
        .output-box {
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 20px;
            border-radius: 5px;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sistema Experto de Gestión de Proyectos</h1>
    
    <h2>Consultas Generales</h2>
    <div class="grid-buttons">
        <button onclick="ejecutarConsultaGeneral('listar_desarrolladores(Nombre, Nivel).', '1. Lista de Desarrolladores: ')">
            1. Listar Desarrolladores
        </button>
        <button onclick="ejecutarConsultaGeneral('listar_proyectos(Id, Nivel).', '2. Lista de Proyectos: ')">
            2. Listar Proyectos
        </button>
    </div>

    <h2>Consultas por Proyecto Individual</h2>
    <div class="search-box">
        <label for="selectProyecto">Selecciona un Proyecto: </label>
        <select id="selectProyecto">
            <option value="a">Proyecto A (Bajo)</option>
            <option value="b">Proyecto B (Medio)</option>
            <option value="c">Proyecto C (Alto)</option>
            <option value="d">Proyecto D (Muy Alto)</option>
            <option value="e">Proyecto E (Bajo)</option>
            <option value="f">Proyecto F (Medio)</option>
            <option value="g">Proyecto G (Alto)</option>
            <option value="h">Proyecto H (Muy Alto)</option>
            <option value="i">Proyecto I (Bajo)</option>
            <option value="j">Proyecto J (Medio)</option>
        </select>
        <button onclick="verificarPersonal()" style="background-color: #2ecc71;">3. ¿Tiene Personal Necesario?</button>
        <button onclick="calcularFaltantes()" style="background-color: #e67e22;">4. Ver Personal Faltante</button>
    </div>

    <h2>Consola de Resultados</h2>
    <div id="output" class="output-box">El sistema está listo. Elige una opción arriba...</div>
</div>

<script>
    // =========================================================================
    // BASE DE CONOCIMIENTOS (Autónoma - Sin dependencias externas)
    // =========================================================================
    const codigoProlog = `
        % 10 Desarrolladores ficticios
        programador(ana, junior).
        programador(juan, junior).
        programador(pedro, junior).
        programador(lucia, junior).
        programador(carlos, avanzado).
        programador(maria, avanzado).
        programador(jorge, avanzado).
        programador(sofia, senior).
        programador(luis, senior).
        programador(elena, senior).

        % 10 Proyectos ficticios
        proyecto(a, bajo).
        proyecto(b, medio).
        proyecto(c, alto).
        proyecto(d, muy_alto).
        proyecto(e, bajo).
        proyecto(f, medio).
        proyecto(g, alto).
        proyecto(h, muy_alto).
        proyecto(i, bajo).
        proyecto(j, medio).

        % Requerimientos por nivel de proyecto: req(Nivel, Senior, Avanzado, Junior)
        req(bajo, 0, 1, 1).
        req(medio, 1, 1, 0).
        req(alto, 1, 1, 1).
        req(muy_alto, 1, 2, 2).

        % REGLA PROPIA PARA CONTRAR ELEMENTOS (Evita el error de existencia de length/2)
        contar_elementos([], 0).
        contar_elementos([_|Cola], Total) :-
            contar_elementos(Cola, SubTotal),
            Total is SubTotal + 1.

        % Contadores de la plantilla utilizando la regla nativa de conteo
        contar_disponibles(Nivel, Total) :-
            findall(X, programador(X, Nivel), Lista),
            contar_elementos(Lista, Total).

        % Cálculos de déficit evaluados estrictamente con 'is'
        deficit(Requerido, Disponible, Falta) :- 
            Disponible >= Requerido, 
            Falta is 0.
        deficit(Requerido, Disponible, Falta) :- 
            Disponible < Requerido, 
            Falta is Requerido - Disponible.

        % Reglas de interfaz de consulta
        listar_desarrolladores(Nombre, Nivel) :- programador(Nombre, Nivel).
        listar_proyectos(Id, Nivel) :- proyecto(Id, Nivel).

        % Verificación de viabilidad por proyecto
        tiene_personal_necesario(IdProyecto) :-
            proyecto(IdProyecto, NivelProyecto),
            req(NivelProyecto, ReqS, ReqA, ReqJ),
            contar_disponibles(senior, DispS),
            contar_disponibles(avanzado, DispA),
            contar_disponibles(junior, DispJ),
            X1 is DispS - ReqS, X1 >= 0,
            X2 is DispA - ReqA, X2 >= 0,
            X3 is DispJ - ReqJ, X3 >= 0.

        % Cálculo de personal faltante
        personal_faltante(IdProyecto, FaltanSenior, FaltanAvanzados, FaltanJuniors) :-
            proyecto(IdProyecto, NivelProyecto),
            req(NivelProyecto, ReqS, ReqA, ReqJ),
            contar_disponibles(senior, DispS),
            contar_disponibles(avanzado, DispA),
            contar_disponibles(junior, DispJ),
            deficit(ReqS, DispS, FaltanSenior),
            deficit(ReqA, DispA, FaltanAvanzados),
            deficit(ReqJ, DispJ, FaltanJuniors).
    `;

    // Instanciar el objeto principal de Tau-Prolog
    const session = pl.create();
    
    // Cargar el código ligo al iniciar la página
    session.consult(codigoProlog, {
        success: function() { console.log("Base de conocimientos cargada exitosamente de forma nativa."); },
        error: function(err) { console.error("Error al cargar Prolog: ", err); }
    });

    const outputDiv = document.getElementById("output");

    // =========================================================================
    // FUNCIONES JAVASCRIPT
    // =========================================================================

    // Maneja las consultas de listado múltiple (Puntos 1 y 2)
    function ejecutarConsultaGeneral(queryStr, titulo) {
        outputDiv.innerHTML = titulo; // Ajustado aquí para eliminar saltos y líneas decorativas
        
        session.query(queryStr, {
            success: function() {
                function buscarSiguiente() {
                    session.answer({
                        success: function(answer) {
                            let formato = session.format_answer(answer);
                            outputDiv.innerHTML += "\n" + formato; 
                            buscarSiguiente(); 
                        },
                        fail: function() {
                            // Fin de los registros
                        },
                        error: function(err) {
                            outputDiv.innerHTML += "\nError en ciclo: " + err;
                        }
                    });
                }
                buscarSiguiente();
            },
            error: function(err) { outputDiv.innerHTML = "Error en Query: " + err; }
        });
    }

    // Consulta de disponibilidad (Punto 3)
    function verificarPersonal() {
        const idProy = document.getElementById("selectProyecto").value;
        const queryStr = `tiene_personal_necesario(${idProy}).`;
        
        outputDiv.innerHTML = `Analizando viabilidad del Proyecto (${idProy.toUpperCase()})...\n--------------------------------------\n`;

        session.query(queryStr, {
            success: function() {
                session.answer({
                    success: function(answer) {
                        outputDiv.innerHTML += "SÍ. Se cuenta con el personal total requerido en la empresa para cubrir este proyecto.";
                    },
                    fail: function() {
                        outputDiv.innerHTML += "NO. La empresa NO cuenta con el personal suficiente de forma global para abastecer este proyecto.";
                    },
                    error: function(err) {
                        outputDiv.innerHTML += "Error interno de Prolog: " + err;
                    }
                });
            },
            error: function(err) {
                outputDiv.innerHTML += "Error en la consulta: " + err;
            }
        });
    }

    // Consulta de personal faltante a contratar (Punto 4)
    function calcularFaltantes() {
        const idProy = document.getElementById("selectProyecto").value;
        const queryStr = `personal_faltante(${idProy}, S, A, J).`;
        
        outputDiv.innerHTML = `Calculando vacantes para Proyecto (${idProy.toUpperCase()})...\n--------------------------------------\n`;

        session.query(queryStr, {
            success: function() {
                session.answer({
                    success: function(answer) {
                        const s = answer.links.S.value;
                        const a = answer.links.A.value;
                        const j = answer.links.J.value;

                        if(s === 0 && a === 0 && j === 0) {
                            outputDiv.innerHTML += "¡Excelente! No hace falta contratar a nadie. El equipo actual cubre perfectamente la demanda.";
                        } else {
                            outputDiv.innerHTML += "Se requiere contratar al siguiente personal:\n";
                            outputDiv.innerHTML += `• Seniors Necesarios: ${s}\n`;
                            outputDiv.innerHTML += `• Avanzados Necesarios: ${a}\n`;
                            outputDiv.innerHTML += `• Juniors Necesarios: ${j}\n`;
                        }
                    },
                    fail: function() {
                        outputDiv.innerHTML += "No se pudieron calcular los faltantes.";
                    },
                    error: function(err) {
                        outputDiv.innerHTML += "Error interno de Prolog: " + err;
                    }
                });
            },
            error: function(err) {
                outputDiv.innerHTML += "Error en la consulta: " + err;
            }
        });
    }
</script>

</body>
</html>
